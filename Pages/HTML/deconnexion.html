<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deconnexion - Ymmo</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js" defer></script>
  <script src="auth.js" defer></script>
</head>
<body data-page="logout" class="auth-page">
  <main class="auth-logout">
    <section class="auth-panel auth-panel-center">
      <p class="section-kicker">Session locale</p>
      <h1>Deconnexion effectuee</h1>

      <div class="button-row">
        <a class="btn ghost" href="/">Retour accueil</a>
        <a class="btn primary" href="/connexion">Se reconnecter</a>
      </div>
    </section>
  </main>

</html>
